name: Release → Discord

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re-)announce, e.g. v1.3.6"
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          # fetch notes/url via API instead of interpolating github.event.release.body into the
          # script text -- avoids shell injection from quotes/special chars in release notes, and
          # lets this same step handle both the automatic publish event and a manual re-run
          NOTES=$(gh release view "$TAG" -R "$REPO" --json body -q .body)
          RELEASE_URL=$(gh release view "$TAG" -R "$REPO" --json url -q .url)

          PAYLOAD=$(jq -n \
            --arg version "$TAG" \
            --arg notes "$NOTES" \
            --arg url "$RELEASE_URL" \
            --arg repo "$REPO" \
            '{
              embeds: [{
                title: ("🚀 " + $version + " veröffentlicht"),
                description: (if $notes != "" then $notes else "_Keine Release-Notes_" end),
                color: 5763719,
                url: $url,
                footer: { text: $repo },
                timestamp: (now | todate)
              }]
            }')
          # ?wait=true makes Discord return the created message object (incl. its id) instead of
          # a bare 204 No Content -- without this the message id is unrecoverable afterwards, and
          # a duplicate post (e.g. from deleting+recreating a GitHub release for the same version)
          # can never be individually cleaned up again
          RESPONSE=$(curl -s -X POST "${DISCORD_WEBHOOK}?wait=true" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          MESSAGE_ID=$(echo "$RESPONSE" | jq -r '.id // empty')

          if [ -n "$MESSAGE_ID" ]; then
            echo "Discord message id for $TAG: $MESSAGE_ID"
            {
              echo "### Discord message posted for $TAG"
              echo "- Message ID: \`$MESSAGE_ID\`"
              echo "- To delete: \`curl -X DELETE \"\$DISCORD_WEBHOOK/messages/$MESSAGE_ID\"\`"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Warning: could not extract Discord message id from response: $RESPONSE"
          fi
